name: Release

# Publishes to npm automatically whenever the version in package.json changes
# on main, then creates a matching GitHub Release (tag + CHANGELOG notes).
# npm auth is via Trusted Publisher (OIDC) — no NPM_TOKEN secret. The
# `prepublishOnly` script (verify + build) gates every publish, so a broken
# or failing build can never ship.

on:
  push:
    branches: [main]
    paths: ["package.json"]
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # create the git tag + GitHub Release
  id-token: write # npm OIDC trusted publishing + provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24's bundled npm (>= 11.5) supports OIDC trusted publishing and
          # ships an intact `sigstore` for --provenance. Do NOT `npm install -g
          # npm@latest` — a global reinstall leaves npm's bundled deps (sigstore)
          # incomplete and breaks provenance.
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Publish to npm if this version is new
        id: publish
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — nothing to do."
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing $NAME@$VERSION…"
            npm publish --provenance --access public
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.publish.outputs.version }}
        run: |
          # Extract this version's section from CHANGELOG.md (## <version> ...
          # up to the next ## heading). Fall back to auto-generated notes.
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ ("^## " ver "([^0-9]|$)") { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            gh release create "v$VERSION" --title "v$VERSION" --generate-notes
          else
            printf '%s\n' "$NOTES" > /tmp/release-notes.md
            gh release create "v$VERSION" --title "v$VERSION" --notes-file /tmp/release-notes.md
          fi
