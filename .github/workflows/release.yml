name: Release

# Publishes to npm automatically whenever the version in package.json changes
# on main. Auth is via npm Trusted Publisher (OIDC) — no NPM_TOKEN secret.
# The `prepublishOnly` script (verify + build) gates every publish, so a
# broken or failing build can never ship.

on:
  push:
    branches: [main]
    paths: ["package.json"]
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing + provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Publish to npm if this version is new
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — nothing to do."
          else
            echo "Publishing $NAME@$VERSION…"
            npm publish --provenance --access public
          fi
