<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="VerisKit social card">
  <title>VerisKit social share card (1200x630)</title>
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A2E33"/>
      <stop offset="1" stop-color="#041418"/>
    </linearGradient>
    <linearGradient id="og-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="630" fill="url(#og-bg)"/>
  <!-- subtle hairline frame -->
  <rect x="40" y="40" width="1120" height="550" rx="28" fill="none" stroke="#14384033" stroke-width="2"/>
  <!-- mark -->
  <g transform="translate(470 120) scale(0.5078125)">
    <path d="M 168 214 L 230 340 L 346 158"
          fill="none" stroke="url(#og-mark)" stroke-width="40"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="600" y="450" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="88" font-weight="700" letter-spacing="-3" fill="#EAFAF6">VerisKit</text>
  <text x="600" y="510" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="30" font-weight="400" letter-spacing="0" fill="#5EEAD4">The trust layer for software delivery</text>
  <text x="600" y="560" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="400" letter-spacing="3" fill="#3B5B5B">BASEFRAME LABS</text>
</svg>
