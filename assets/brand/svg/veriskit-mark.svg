<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="VerisKit">
  <title>VerisKit mark</title>
  <defs>
    <linearGradient id="vk-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <!-- V for Veris that lifts into a verification check (no tile, transparent) -->
