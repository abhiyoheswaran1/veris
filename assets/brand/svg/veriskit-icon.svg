<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="VerisKit logo">
  <title>VerisKit logo</title>
  <defs>
    <!-- Dark teal-tinted tile, matching the Baseframe icon system -->
    <linearGradient id="vk-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A2E33"/>
      <stop offset="1" stop-color="#041418"/>
    </linearGradient>
    <!-- Accent stroke: teal, top-left to bottom-right (family convention) -->
    <linearGradient id="vk-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="114" ry="114" fill="url(#vk-bg)"/>
  <!-- V for Veris that also reads as a verification check:
       shorter left arm, long lifting right arm -->
  <path d="M 168 214 L 230 340 L 346 158"
        fill="none" stroke="url(#vk-mark)" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
